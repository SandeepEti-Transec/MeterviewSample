  jaeger:
    image: jaegertracing/all-in-one:latest
#    port mappings: https://www.jaegertracing.io/docs/1.32/getting-started/
    ports:
      - "55076:5775/udp"
      - "55075:6831/udp"
      - "55077:6832/udp"
      - "55078:5778"
      - "55079:16686"
      - "55080:14250"
      - "55081:14268"
      - "55082:14269"
      - "55083:9411"

        
volumes:
  # compose volumes marker - do not delete
  meterview.trendlines.api-data:
  meterview.channels.api-data:
  meterview.devicealert.api-data:
  meterview.devices.api-data:
  meterview.support.api-data:
  meterview.alarms.api-data:
  meterview.reporting.api-data:
  meterview.notification.api-data:
  meterview.identity.api-data:
  meterview.screenrendering.api-data:
