version: '3.7'

services:
  meterview.trendlines.api-db:
    image: postgres
    restart: always
    ports:
      - '55064:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dev_meterview.trendlines.api
    volumes:
      - meterview.trendlines.api-data:/var/lib/postgresql/data
  meterview.channels.api-db:
    image: postgres
    restart: always
    ports:
      - '55059:5432'
    environment:
